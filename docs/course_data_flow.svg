<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="940" viewBox="0 0 1280 940" fill="none">
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0L10 4L0 8Z" fill="#7048e8"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0L10 4L0 8Z" fill="#2f9e44"/></marker>
    <style>
      .title { font: 700 30px "Inter", "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px "Inter", "Segoe UI", sans-serif; fill: #334155; }
      .group { font: 700 20px "Inter", "Segoe UI", sans-serif; fill: #334155; }
      .lane { font: 700 24px "Inter", "Segoe UI", sans-serif; fill: #0f172a; }
      .boxtitle { font: 700 18px "Inter", "Segoe UI", sans-serif; fill: #0f172a; text-anchor: middle; }
      .boxsub { font: 500 15px "Inter", "Segoe UI", sans-serif; fill: #334155; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1280" height="940" fill="#ffffff"/>
  <text x="640" y="56" class="title" text-anchor="middle">Using the Prepared Course Data</text>
  <text x="640" y="88" class="subtitle" text-anchor="middle">Labs 3 and 4 work from the files already committed in this repo.</text>

  <rect x="60" y="128" width="1160" height="252" rx="18" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="10 8"/>
  <text x="86" y="152" class="group">Prepared course data already in the repo</text>

  <rect x="120" y="216" width="350" height="100" rx="16" fill="#D0EBFF" stroke="#1971C2" stroke-width="2.2"/>
  <text x="295" y="256" class="boxtitle">Professor corpus</text>
  <text x="295" y="283" class="boxsub">professors/ + professors.md</text>

  <rect x="490" y="216" width="300" height="100" rx="16" fill="#D0EBFF" stroke="#1971C2" stroke-width="2.2"/>
  <text x="640" y="256" class="boxtitle">Lab 3 graph seeds</text>
  <text x="640" y="283" class="boxsub">graph_seed/*.json</text>

  <rect x="810" y="216" width="320" height="100" rx="16" fill="#D0EBFF" stroke="#1971C2" stroke-width="2.2"/>
  <text x="970" y="256" class="boxtitle">Lab 4 incoming files</text>
  <text x="970" y="283" class="boxsub">incoming_artifacts/</text>

  <rect x="60" y="430" width="1160" height="400" rx="18" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="10 8"/>
  <text x="86" y="454" class="group">Choose the lab path you are working on</text>
  <line x1="640" y1="510" x2="640" y2="790" stroke="#CBD5E1" stroke-width="1.4" stroke-dasharray="8 8"/>
  <text x="170" y="540" class="lane">Lab 3</text>
  <text x="770" y="540" class="lane">Lab 4</text>

  <rect x="170" y="568" width="300" height="92" rx="16" fill="#D0BFFF" stroke="#7048E8" stroke-width="2.2"/>
  <text x="320" y="605" class="boxtitle">Run setup loader</text>
  <text x="320" y="632" class="boxsub">prepare_lab3_graph.py</text>

  <rect x="210" y="692" width="220" height="88" rx="16" fill="#B2F2BB" stroke="#2F9E44" stroke-width="2.2"/>
  <text x="320" y="728" class="boxtitle">Neo4j</text>
  <text x="320" y="754" class="boxsub">local database</text>

  <rect x="170" y="812" width="300" height="92" rx="16" fill="#D0BFFF" stroke="#7048E8" stroke-width="2.2"/>
  <text x="320" y="849" class="boxtitle">Lab 3 notebook</text>
  <text x="320" y="876" class="boxsub">query the local professor graph</text>

  <rect x="760" y="590" width="320" height="100" rx="16" fill="#D0BFFF" stroke="#7048E8" stroke-width="2.2"/>
  <text x="920" y="628" class="boxtitle">Prepared local workspace</text>
  <text x="920" y="655" class="boxsub">professor corpus + incoming files</text>

  <rect x="770" y="736" width="300" height="100" rx="16" fill="#D0BFFF" stroke="#7048E8" stroke-width="2.2"/>
  <text x="920" y="774" class="boxtitle">Lab 4 notebook</text>
  <text x="920" y="801" class="boxsub">deep-agent professor workflow</text>

  <path d="M242.5 316V500H275V568" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M685 316V500H380V568" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M320 660V692" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M320 780V812" stroke="#2F9E44" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M365 316V500H872V590" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M922 316V500H904V590" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M920 690V736" stroke="#7048E8" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
</svg>
