<text x="56" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Swarm composition — handoffs, active_agent, and same-thread memory</text>
<text x="56" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#475569">create_swarm wires the two specialists into one parent graph; a handoff returns Command(graph=PARENT) which atomically swaps the active_agent in checkpointed state.</text>
