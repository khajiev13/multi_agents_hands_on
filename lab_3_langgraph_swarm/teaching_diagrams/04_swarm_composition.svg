<text x="860.0" y="429.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">→ Command(goto='ResearchMatchAgent',</text>
<text x="860.0" y="451.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">   graph=PARENT,</text>
<text x="860.0" y="473.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">   update={ active_agent: 'ResearchMatchAgent' })</text>
<rect x="790" y="660" width="140" height="110" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="860.0" y="687.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">transfer_to_professor_lookup</text>
<text x="860.0" y="709.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">→ Command(goto='ProfessorLookupAgent',</text>
<text x="860.0" y="731.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">   graph=PARENT,</text>
<text x="860.0" y="753.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">   update={ active_agent: 'ProfessorLookupAgent' })</text>
<rect x="60" y="830" width="1600" height="44" rx="18" fill="#1e293b" stroke="#0f172a" stroke-width="3.0"/>
<text x="860.0" y="858.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Same-thread memory: how active_agent persists across turns</text>
<rect x="60" y="890" width="380" height="180" rx="18" fill="#eef2ff" stroke="#4f46e5" stroke-width="3.0"/>
<text x="250.0" y="941.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Turn 1 — start</text>
<text x="250.0" y="963.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="250.0" y="985.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">active_agent = 'ProfessorLookupAgent'</text>
<text x="250.0" y="1007.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">messages = [ HumanMessage('which profs match</text>
<text x="250.0" y="1029.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">             computer vision?') ]</text>
<rect x="470" y="890" width="440" height="180" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="3.0"/>
<text x="690.0" y="930.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Turn 1 — after handoff</text>
<text x="690.0" y="952.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="690.0" y="974.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">active_agent = 'ResearchMatchAgent'</text>
<text x="690.0" y="996.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">messages += [ AIMessage(tool_calls=[transfer_to_…]),</text>
<text x="690.0" y="1018.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">              ToolMessage('Successfully transferred…'),</text>
<text x="690.0" y="1040.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">              AIMessage(&lt;grounded answer&gt;) ]</text>
<rect x="940" y="890" width="380" height="180" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3.0"/>
<text x="1130.0" y="919.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Turn 2 — same thread_id</text>
<text x="1130.0" y="941.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="1130.0" y="963.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Swarm reads checkpoint → starts at</text>
<text x="1130.0" y="985.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">ResearchMatchAgent (no supervisor needed).</text>
<text x="1130.0" y="1007.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">If user pivots to one named professor,</text>
<text x="1130.0" y="1029.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">ResearchMatchAgent calls</text>
<text x="1130.0" y="1051.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">transfer_to_professor_lookup.</text>
<rect x="1350" y="890" width="310" height="180" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="3.0"/>
<text x="1505.0" y="941.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">New thread_id ⇒ fresh state.</text>
<text x="1505.0" y="963.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="1505.0" y="985.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">default_active_agent kicks in:</text>
<text x="1505.0" y="1007.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">the conversation begins again at</text>
<text x="1505.0" y="1029.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">ProfessorLookupAgent with empty messages.</text>
