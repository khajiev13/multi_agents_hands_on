<text x="1300.0" y="647.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Bound tools:</text>
<text x="1300.0" y="666.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">• find_professors_by_topics_tool — Cypher:</text>
<text x="1300.0" y="685.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">    MATCH (:Professor)-[:HAS_RESEARCH_INTEREST]</text>
<text x="1300.0" y="704.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">          -&gt;(:ResearchTopic)</text>
<text x="1300.0" y="723.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">• transfer_to_professor_lookup — handoff:</text>
<text x="1300.0" y="742.05" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">    Command(goto, graph=PARENT)</text>
