<text x="190.0" y="177.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Student</text>
<text x="190.0" y="199.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="190.0" y="221.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">config = { configurable:</text>
<text x="190.0" y="243.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  { thread_id: 'lab3-xyz' } }</text>
<rect x="380" y="140" width="760" height="130" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3.0"/>
<text x="760.0" y="166.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">create_swarm(</text>
<text x="760.0" y="188.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  [ ProfessorLookupAgent, ResearchMatchAgent ],</text>
<text x="760.0" y="210.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  default_active_agent='ProfessorLookupAgent',</text>
<text x="760.0" y="232.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  state_schema=Lab3State,</text>
<text x="760.0" y="254.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">)</text>
<rect x="1200" y="140" width="460" height="130" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="3.0"/>
<text x="1430.0" y="166.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">.compile(checkpointer=InMemorySaver())</text>
<text x="1430.0" y="188.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="1430.0" y="210.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">thread_id  →  StateSnapshot {</text>
