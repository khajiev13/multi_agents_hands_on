<text x="420.0" y="656.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">• resolve_professor_tool   — Cypher:</text>
<text x="420.0" y="675.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">    MATCH (:Professor) WHERE alias CONTAINS …</text>
<text x="420.0" y="694.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">• get_professor_facts_tool — Cypher:</text>
<text x="420.0" y="713.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">    MATCH (p)-[*]-&gt;(...) UNION ALL ...</text>
<text x="420.0" y="732.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">• transfer_to_research_match — handoff:</text>
<text x="420.0" y="751.55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f172a">    Command(goto, graph=PARENT)</text>
