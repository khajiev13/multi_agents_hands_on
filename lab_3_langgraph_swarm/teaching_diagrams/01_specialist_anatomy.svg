<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<rect x="20" y="20" width="1460" height="900" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="56" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Anatomy of a Specialist Subgraph</text>
<text x="56" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#475569">Each specialist is a tiny LangGraph: START -&gt; llm -&gt; ToolNode -&gt; llm, until the model stops calling tools.</text>
<path d="M 730.0 466 L 730.0 520" fill="none" stroke="#0284c7" stroke-width="2.8"/>
<polygon points="730.0,520 724.0,509 736.0,509" fill="#0284c7"/>
<path d="M 840 565.0 L 920 565.0" fill="none" stroke="#4f46e5" stroke-width="2.8"/>
<polygon points="920,565.0 909,559.0 909,571.0" fill="#4f46e5"/>
<rect x="832.0" y="542.0" width="96" height="24" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="880.0" y="560.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">tool_calls</text>
<path d="M 1030.0 520 L 1030.0 470 L 790.0 470 L 790.0 520" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="790.0,520 784.0,509 796.0,509" fill="#7c3aed"/>
<rect x="866.0" y="447.0" width="88" height="24" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
<text x="910.0" y="465.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">loop back</text>
<path d="M 690.0 610 L 690.0 720" fill="none" stroke="#d97706" stroke-width="2.8"/>
<polygon points="690.0,720 684.0,709 696.0,709" fill="#d97706"/>
<rect x="630.0" y="642.0" width="120" height="24" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="1.4"/>
<text x="690.0" y="660.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">no tool_calls</text>
<path d="M 580 565 L 620 565" fill="none" stroke="#94a3b8" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="620,565 609,559 609,571" fill="#94a3b8"/>
<path d="M 1190 545 L 1140 545" fill="none" stroke="#94a3b8" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="1140,545 1151,539 1151,551" fill="#94a3b8"/>
<rect x="60" y="150" width="380" height="170" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3.0"/>
<text x="250.0" y="185.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Lab3State (extends SwarmState)</text>
<text x="250.0" y="207.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="250.0" y="229.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">• messages: list[BaseMessage]</text>
<text x="250.0" y="251.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">• active_agent: str</text>
<text x="250.0" y="273.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="250.0" y="295.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">(only two fields persist)</text>
<rect x="1000" y="150" width="460" height="230" rx="18" fill="#f8fafc" stroke="#475569" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1230.0" y="171.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">build_specialist_agent(name, prompt, tools):</text>
<text x="1230.0" y="193.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  bound_model = model.bind_tools(tools)</text>
<text x="1230.0" y="215.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  tool_node  = ToolNode(tools)</text>
<text x="1230.0" y="237.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow   = StateGraph(Lab3State)</text>
<text x="1230.0" y="259.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow.add_node('llm',   call_model)</text>
<text x="1230.0" y="281.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow.add_node('tools', tool_node)</text>
<text x="1230.0" y="303.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow.add_edge(START, 'llm')</text>
<text x="1230.0" y="325.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow.add_conditional_edges('llm', route_after_model)</text>
<text x="1230.0" y="347.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  workflow.add_edge('tools', 'llm')</text>
<text x="1230.0" y="369.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  return workflow.compile(name=name)</text>
<ellipse cx="730.0" cy="438.0" rx="70.0" ry="28.0" fill="#e0f2fe" stroke="#0284c7" stroke-width="3.0"/>
<text x="730.0" y="444.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">START</text>
<rect x="620" y="520" width="220" height="90" rx="18" fill="#eef2ff" stroke="#4f46e5" stroke-width="3.0"/>
<text x="730.0" y="559.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">llm</text>
<text x="730.0" y="583.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">(call_model)</text>
<rect x="920" y="520" width="220" height="90" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3.0"/>
<text x="1030.0" y="559.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">tools</text>
<text x="1030.0" y="583.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">(ToolNode)</text>
<ellipse cx="730.0" cy="748.0" rx="70.0" ry="28.0" fill="#fef3c7" stroke="#d97706" stroke-width="3.0"/>
<text x="730.0" y="754.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">END</text>
<rect x="60" y="480" width="520" height="170" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="320.0" y="504.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">call_model(state, config):</text>
<text x="320.0" y="526.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 1. emit teaching event</text>
<text x="320.0" y="548.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 2. response = bound_model.invoke(</text>
<text x="320.0" y="570.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">      [SystemMessage(prompt), *state['messages']])</text>
<text x="320.0" y="592.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 3. return {</text>
<text x="320.0" y="614.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">      messages: [response],</text>
<text x="320.0" y="636.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">      active_agent: agent_name }</text>
<rect x="1190" y="480" width="270" height="130" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1325.0" y="506.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">route_after_model(state):</text>
<text x="1325.0" y="528.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  last = state['messages'][-1]</text>
<text x="1325.0" y="550.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  if AIMessage and last.tool_calls:</text>
<text x="1325.0" y="572.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">      return 'tools'</text>
<text x="1325.0" y="594.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  return END</text>
<rect x="920" y="640" width="540" height="60" rx="18" fill="#faf5ff" stroke="#7c3aed" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1190.0" y="653.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">ToolNode runs every tool the model called</text>
<text x="1190.0" y="675.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">in parallel, then appends ToolMessage(s)</text>
<text x="1190.0" y="697.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">back into state['messages'].</text>
<rect x="100" y="820" width="1300" height="60" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="3.0"/>
<text x="750.0" y="855.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">The loop is the whole agent. It stops only when the model returns no tool_calls — then the subgraph hits END and control returns to the parent swarm.</text>
</svg>