<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1040" viewBox="0 0 1720 1040">
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<rect x="20" y="20" width="1680" height="1000" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="56" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Anatomy of a Deep Agent</text>
<text x="56" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#475569">create_deep_agent wires one model into a tool loop. The 'tools' node bundles file tools, execute, custom tools, subagent dispatchers, and a skills resolver.</text>
<path d="M 850.0 486 L 850.0 540" fill="none" stroke="#0284c7" stroke-width="2.8"/>
<polygon points="850.0,540 844.0,529 856.0,529" fill="#0284c7"/>
<path d="M 970 585.0 L 1080 585.0" fill="none" stroke="#4f46e5" stroke-width="2.8"/>
<polygon points="1080,585.0 1069,579.0 1069,591.0" fill="#4f46e5"/>
<rect x="977.0" y="562.0" width="96" height="24" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="1025.0" y="580.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">tool_calls</text>
<path d="M 1220.0 540 L 1220.0 490 L 920.0 490 L 920.0 540" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="920.0,540 914.0,529 926.0,529" fill="#7c3aed"/>
<rect x="1026.0" y="467.0" width="88" height="24" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
<text x="1070.0" y="485.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">loop back</text>
<path d="M 800.0 630 L 800.0 740" fill="none" stroke="#d97706" stroke-width="2.8"/>
<polygon points="800.0,740 794.0,729 806.0,729" fill="#d97706"/>
<rect x="740.0" y="662.0" width="120" height="24" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="1.4"/>
<text x="800.0" y="680.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">no tool_calls</text>
<path d="M 700 565 L 730 565" fill="none" stroke="#94a3b8" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="730,565 719,559 719,571" fill="#94a3b8"/>
