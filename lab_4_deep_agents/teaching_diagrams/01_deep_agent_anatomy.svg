<polygon points="1360,585 1371,579 1371,591" fill="#94a3b8"/>
<path d="M 1120.0 630 L 1120.0 720 L 340.0 720 L 340.0 740" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="340.0,740 334.0,729 346.0,729" fill="#7c3aed"/>
<path d="M 1170.0 630 L 1170.0 720 L 600.0 720 L 600.0 740" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="600.0,740 594.0,729 606.0,729" fill="#7c3aed"/>
<path d="M 1220.0 630 L 1220.0 720 L 860.0 720 L 860.0 740" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="860.0,740 854.0,729 866.0,729" fill="#7c3aed"/>
<path d="M 1270.0 630 L 1270.0 720 L 1120.0 720 L 1120.0 740" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="1120.0,740 1114.0,729 1126.0,729" fill="#7c3aed"/>
<path d="M 1320.0 630 L 1320.0 720 L 1380.0 720 L 1380.0 740" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="1380.0,740 1374.0,729 1386.0,729" fill="#7c3aed"/>
<rect x="60" y="150" width="380" height="230" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3.0"/>
<text x="250.0" y="193.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">DeepAgentState</text>
<text x="250.0" y="215.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"></text>
<text x="250.0" y="237.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">• messages: list[BaseMessage]</text>
<text x="250.0" y="259.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">• files: dict[str, str]</text>
<text x="250.0" y="281.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">    (virtual FS — bypassed when</text>
<text x="250.0" y="303.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">     LocalShellBackend writes</text>
<text x="250.0" y="325.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">     to the real workspace)</text>
<text x="250.0" y="347.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">• todos: list[Todo]</text>
<rect x="1100" y="150" width="580" height="230" rx="18" fill="#f8fafc" stroke="#475569" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1390.0" y="171.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">create_deep_agent(</text>
<text x="1390.0" y="193.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  model              = build_model(settings),</text>
<text x="1390.0" y="215.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  tools              = [rebuild_professors_index_tool],</text>
<text x="1390.0" y="237.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  system_prompt      = MAIN_SYSTEM_PROMPT,</text>
<text x="1390.0" y="259.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  backend            = LocalShellBackend(root_dir=...),</text>
<text x="1390.0" y="281.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  subagents          = [add_professor_subagent],</text>
<text x="1390.0" y="303.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  checkpointer       = InMemorySaver(),</text>
<text x="1390.0" y="325.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">  name               = 'ProfessorWorkspaceAgent',</text>
<text x="1390.0" y="347.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">)</text>
<text x="1390.0" y="369.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">→ compiled LangGraph: START → model → tools → … → END</text>
<ellipse cx="850.0" cy="458.0" rx="70.0" ry="28.0" fill="#e0f2fe" stroke="#0284c7" stroke-width="3.0"/>
<text x="850.0" y="464.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">START</text>
<rect x="730" y="540" width="240" height="90" rx="18" fill="#eef2ff" stroke="#4f46e5" stroke-width="3.0"/>
<text x="850.0" y="579.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">model</text>
<text x="850.0" y="603.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">(LLM call)</text>
<rect x="1080" y="540" width="280" height="90" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3.0"/>
<text x="1220.0" y="579.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">tools</text>
<text x="1220.0" y="603.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">(bundled ToolNode)</text>
<ellipse cx="850.0" cy="768.0" rx="70.0" ry="28.0" fill="#fef3c7" stroke="#d97706" stroke-width="3.0"/>
<text x="850.0" y="774.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">END</text>
<rect x="60" y="500" width="640" height="130" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="380.0" y="537.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">model step:</text>
<text x="380.0" y="559.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 1. read messages + system_prompt</text>
<text x="380.0" y="581.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 2. emit AIMessage with optional tool_calls</text>
<text x="380.0" y="603.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> 3. if no tool_calls → END</text>
<rect x="1400" y="540" width="280" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1540.0" y="568.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">routing rule:</text>
<text x="1540.0" y="590.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> AIMessage.tool_calls? → 'tools'</text>
<text x="1540.0" y="612.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a"> else                  → END</text>
<rect x="420" y="660" width="1240" height="60" rx="18" fill="#faf5ff" stroke="#7c3aed" stroke-width="3.0" stroke-dasharray="8 6"/>
<text x="1040.0" y="684.75" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#0f172a">ToolNode runs every tool.tool_calls in parallel and appends ToolMessage(s) back into state.</text>
<text x="1040.0" y="705.75" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#0f172a">Deep Agents pre-bundle five categories of tools so the model can mix them in one turn:</text>
<rect x="220" y="740" width="240" height="140" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="3.0"/>
<text x="340.0" y="784.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Built-in file tools</text>
<text x="340.0" y="804.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">(ls / read_file / write_file /</text>
<text x="340.0" y="824.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">edit_file / glob / grep)</text>
<text x="340.0" y="844.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">backed by LocalShellBackend</text>
<rect x="480" y="740" width="240" height="140" rx="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="3.0"/>
<text x="600.0" y="784.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">execute(cmd)</text>
<text x="600.0" y="804.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">shell command in</text>
<text x="600.0" y="824.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">backend.root_dir</text>
<text x="600.0" y="844.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">(timeout, env, output cap)</text>
<rect x="740" y="740" width="240" height="140" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3.0"/>
<text x="860.0" y="794.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Custom @tool functions</text>
<text x="860.0" y="814.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">you pass via tools=[...]</text>
<text x="860.0" y="834.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">(here: rebuild_professors_index_tool)</text>
<rect x="1000" y="740" width="240" height="140" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3.0"/>
<text x="1120.0" y="784.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Subagent dispatchers</text>
<text x="1120.0" y="804.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">auto-generated from</text>
<text x="1120.0" y="824.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">subagents=[...]</text>
<text x="1120.0" y="844.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">(here: AddProfessorSubagent)</text>
<rect x="1260" y="740" width="240" height="140" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3.0"/>
<text x="1380.0" y="784.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Skills resolver</text>
<text x="1380.0" y="804.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">auto-loads /skills/ entries</text>
<text x="1380.0" y="824.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">so the model can fetch</text>
<text x="1380.0" y="844.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">SKILL.md on demand</text>
<rect x="100" y="920" width="1520" height="60" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="3.0"/>
<text x="860.0" y="955.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Same loop as Lab 3, richer toolbox. The 'tools' step can read a file, run a shell command, call a custom function, dispatch a subagent, or pull in a skill — all on the same turn.</text>
</svg>