<text x="860.0" y="835.6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Same workspace + same thread_id across turns — files persist between calls</text>
<rect x="62" y="880" width="380" height="200" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="3.0"/>
<text x="252.0" y="944.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Turn 1 — broad question</text>
<text x="252.0" y="964.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a"></text>
<text x="252.0" y="984.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">parent.model emits read_file('professors.md').</text>
<text x="252.0" y="1004.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">LocalShellBackend reads the index from disk.</text>
<text x="252.0" y="1024.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Reply uses just the index lines.</text>
<rect x="467" y="880" width="380" height="200" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3.0"/>
<text x="657.0" y="944.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Turn 2 — named professor</text>
<text x="657.0" y="964.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a"></text>
<text x="657.0" y="984.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">parent.model reads professors.md, then opens</text>
<text x="657.0" y="1004.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">professors/&lt;slug&gt;.md only when more detail is</text>
<text x="657.0" y="1024.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">needed. Same thread_id, so prior context stays.</text>
<rect x="872" y="880" width="380" height="200" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3.0"/>
<text x="1062.0" y="944.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Turn 3 — add from URL</text>
<text x="1062.0" y="964.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a"></text>
<text x="1062.0" y="984.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">parent dispatches AddProfessorSubagent.</text>
<text x="1062.0" y="1004.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Subagent loads SKILL.md, runs execute() once.</text>
<text x="1062.0" y="1024.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">New dossier appears under professors/.</text>
<rect x="1277" y="880" width="380" height="200" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3.0"/>
<text x="1467.0" y="944.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Turn 4 — index + confirm</text>
<text x="1467.0" y="964.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a"></text>
<text x="1467.0" y="984.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">On status=added the parent calls</text>
<text x="1467.0" y="1004.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">rebuild_professors_index_tool, then replies</text>
<text x="1467.0" y="1024.9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">with the final confirmation. State is persisted.</text>
