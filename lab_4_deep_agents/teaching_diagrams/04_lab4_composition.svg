<text x="1550.0" y="578.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">  add-professor-from-url/</text>
<text x="1550.0" y="596.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">    SKILL.md</text>
