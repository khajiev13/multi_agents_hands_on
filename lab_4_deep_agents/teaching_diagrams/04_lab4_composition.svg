<text x="1550.0" y="650.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Resolved by the deep agent's</text>
<text x="1550.0" y="668.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">built-in skills loader.</text>
