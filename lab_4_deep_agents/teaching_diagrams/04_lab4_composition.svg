<text x="1550.0" y="396.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">root_dir = lab_4_deep_agents/sandbox</text>
<text x="1550.0" y="414.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">virtual_mode = False  (writes hit disk)</text>
<text x="1550.0" y="432.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">timeout = 300s, output cap = 100KB</text>
