<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1180" viewBox="0 0 1720 1180">
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<rect x="20" y="20" width="1680" height="1140" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="56" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">ProfessorWorkspaceAgent — internals &amp; runtime workspace</text>
<text x="56" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#475569">System prompt + built-in file tools + one custom helper + one subagent dispatcher, all rooted in lab_4_deep_agents/sandbox/.</text>
<path d="M 270 460.0 L 320 460.0" fill="none" stroke="#4f46e5" stroke-width="2.8"/>
<polygon points="320,460.0 309,454.0 309,466.0" fill="#4f46e5"/>
<rect x="247.0" y="437.0" width="96" height="24" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="295.0" y="455.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">tool_calls</text>
<path d="M 400.0 420 L 400.0 400 L 190.0 400 L 190.0 420" fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="8 6"/>
<polygon points="190.0,420 184.0,409 196.0,409" fill="#7c3aed"/>
